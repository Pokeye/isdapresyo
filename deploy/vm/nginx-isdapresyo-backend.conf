# Nginx reverse proxy for IsdaPresyo backend
# - Put this in /etc/nginx/sites-available/isdapresyo-backend
# - Symlink to /etc/nginx/sites-enabled/
# - Replace server_name and TLS directives as needed

server {
  listen 80;
  server_name api.example.com;

  # If using certbot, it will typically inject the HTTPS redirect + ACME challenge handling.

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
